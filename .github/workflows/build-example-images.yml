name: Build Example Agent Images

# Builds and publishes the ready-to-use example agent images under examples/**
# to GitHub Container Registry, in parallel. Mirrors build-node-images.yml
# but targets the example demos (they don't reimplement the harness — just
# bundle an agent config + README + a curl-based registration script).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/build-example-images.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: claude-agent-sdk
            image: oma-example-claude-agent-sdk
            context: examples/claude-agent-sdk
          - name: flue
            image: oma-example-flue
            context: examples/flue
          - name: coding-agent
            image: oma-example-coding-agent
            context: examples/coding-agent
          - name: self-improvement-agent
            image: oma-example-self-improvement-agent
            context: examples/self-improvement-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=example-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=example-${{ matrix.name }}
          platforms: linux/amd64
