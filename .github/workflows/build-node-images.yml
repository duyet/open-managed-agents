name: Build Node Self-Host Images

# Build and publish the Node self-host container images (main-node + oma-vault)
# to GitHub Container Registry so k8s can pull them directly instead of relying
# on node-local `k3s ctr images import`. Mirrors build-sandbox-image.yml but
# targets ghcr.io with GITHUB_TOKEN (no extra secrets).

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/main-node/**'
      - 'apps/oma-vault/**'
      - 'apps/main/**'
      - 'apps/agent/**'
      - 'apps/console/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-node-images.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main-node
            image: oma-main-node
            dockerfile: apps/main-node/Dockerfile
          - name: oma-vault
            image: oma-vault
            dockerfile: apps/oma-vault/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64
