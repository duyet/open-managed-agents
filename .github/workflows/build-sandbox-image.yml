name: Build Sandbox Images

# Build + publish the agent sandbox images to GitHub Container Registry.
# Uses GITHUB_TOKEN (no Docker Hub secrets required) so k8s can pull it
# directly. Mirrors build-node-images.yml.
#
# Two images share this pipeline:
#   - sandbox-base    (apps/agent/Dockerfile)         the default CF/k8s sandbox
#   - sandbox-coding  (apps/agent/Dockerfile.coding)  base + coding-agent CLIs
# The coding image is FROM sandbox-base:latest, so its job `needs` the base
# job to guarantee it pulls the freshly-pushed base rather than a stale one.

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/agent/Dockerfile'
      - 'apps/agent/Dockerfile.coding'
      - '.github/workflows/build-sandbox-image.yml'
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract sandbox SDK version from Dockerfile
        id: ver
        run: |
          V=$(grep -oE 'cloudflare/sandbox:[0-9]+\.[0-9]+\.[0-9]+' apps/agent/Dockerfile | head -1 | cut -d: -f2)
          test -n "$V" || { echo "Could not extract version"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Extracted: $V"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sandbox-base
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent
          file: apps/agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sandbox-base
          cache-to: type=gha,mode=max,scope=sandbox-base
          platforms: linux/amd64

  coding:
    # FROM ghcr.io/duyet/sandbox-base:latest — build after the base is pushed
    # so this pulls the freshly-built base, not a stale one.
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract bundled claude-code version from Dockerfile.coding
        id: ver
        run: |
          V=$(grep -oE 'CLAUDE_CODE_VERSION=[0-9]+\.[0-9]+\.[0-9]+' apps/agent/Dockerfile.coding | head -1 | cut -d= -f2)
          test -n "$V" || { echo "Could not extract CLAUDE_CODE_VERSION"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "claude-code: $V"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/sandbox-coding
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent
          file: apps/agent/Dockerfile.coding
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sandbox-coding
          cache-to: type=gha,mode=max,scope=sandbox-coding
          platforms: linux/amd64
