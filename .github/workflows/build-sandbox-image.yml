name: Build Sandbox Base Image

# Build + publish the agent sandbox base image to GitHub Container Registry.
# Uses GITHUB_TOKEN (no Docker Hub secrets required) so k8s can pull it
# directly. Mirrors build-node-images.yml.

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/agent/Dockerfile'
      - '.github/workflows/build-sandbox-image.yml'
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sandbox-base

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract sandbox SDK version from Dockerfile
        id: ver
        run: |
          V=$(grep -oE 'cloudflare/sandbox:[0-9]+\.[0-9]+\.[0-9]+' apps/agent/Dockerfile | head -1 | cut -d: -f2)
          test -n "$V" || { echo "Could not extract version"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Extracted: $V"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/agent
          file: apps/agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sandbox-base
          cache-to: type=gha,mode=max,scope=sandbox-base
          platforms: linux/amd64
