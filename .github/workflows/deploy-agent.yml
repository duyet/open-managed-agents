name: Deploy Agent Worker

# Deploy the agent/sandbox worker (apps/agent) to Cloudflare Workers.
# This runs SessionDO (per-session Durable Objects + event log) and
# sandbox containers for tool execution.
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/agent/**'
      - 'packages/session-runtime/**'
      - 'packages/sandbox/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-agent.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Healthchecks — start
        if: ${{ vars.HEALTHCHECKS_IO_URL != '' }}
        run: curl -fsS -m 10 --retry 3 "${{ vars.HEALTHCHECKS_IO_URL }}/start" -d "Deploy agent worker started: ${{ github.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/agent
          command: deploy --env production

      - name: Healthchecks — success
        if: success() && vars.HEALTHCHECKS_IO_URL != ''
        run: curl -fsS -m 10 --retry 3 "${{ vars.HEALTHCHECKS_IO_URL }}" -d "Deploy agent worker succeeded: ${{ github.sha }}"

      - name: Healthchecks — failure
        if: failure() && vars.HEALTHCHECKS_IO_URL != ''
        run: curl -fsS -m 10 --retry 3 "${{ vars.HEALTHCHECKS_IO_URL }}/fail" -d "Deploy agent worker failed: ${{ github.sha }}"
