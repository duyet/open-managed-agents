name: Deploy Integrations Worker

# Deploy the integrations gateway worker (apps/integrations) to
# Cloudflare Workers. Handles OAuth flows and webhooks for Slack,
# GitHub, and Linear integrations.
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/integrations/**'
      - 'packages/integrations-core/**'
      - 'packages/slack/**'
      - 'packages/github/**'
      - 'packages/linear/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-integrations.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/integrations
          command: deploy --env production
