name: Deploy Main Worker

# Deploy the main API worker (apps/main) to Cloudflare Workers.
# This is the core HTTP API layer: agents, sessions, environments,
# vaults, memory stores, files, integrations webhooks, billing.
# Routes: app.oma.duyet.net
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/main/**'
      - 'apps/console/**'
      - 'packages/http-routes/**'
      - 'packages/services/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-main.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Healthchecks — start
        if: ${{ vars.HEALTHCHECKS_IO_URL != '' }}
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}/start" \
            -d "Deploy main worker started: ${{ github.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Console UI
        run: pnpm --filter managed-agents-console build

      # Schema before code. This step exists because it didn't: between the
      # initial setup (2026-07-04) and #262, deploys shipped code to prod
      # while migrations only ever ran from scripts/setup-cf.sh by hand, so
      # prod sat 11 migrations behind and /usage 500'd on a column that
      # existed in the schema but not in the database.
      #
      # `--env production` is load-bearing: the top-level d1_databases entry
      # in wrangler.jsonc carries a <set-by-setup-cf-sh> placeholder id, and
      # only env.production has the real one.
      #
      # Applying is idempotent (wrangler tracks applied filenames in the
      # d1_migrations table), so re-running a deploy is a no-op here.
      - name: Apply D1 migrations (oma-auth)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/main
          command: d1 migrations apply oma-auth --remote --env production

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/main
          command: deploy --env production

      - name: Post-deploy health check
        run: curl -fsS --retry 5 --retry-delay 10 --max-time 15 https://app.oma.duyet.net/health

      - name: Healthchecks — success
        if: success() && vars.HEALTHCHECKS_IO_URL != ''
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}" \
            -d "Deploy main worker succeeded: ${{ github.sha }}"

      - name: Healthchecks — failure
        if: failure() && vars.HEALTHCHECKS_IO_URL != ''
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}/fail" \
            -d "Deploy main worker failed: ${{ github.sha }}"
