name: Deploy Website

# Build + deploy the public marketing site (apps/web) to oma.duyet.net via
# a Cloudflare Worker with a Custom Domain route. Requires CLOUDFLARE_API_TOKEN
# and CLOUDFLARE_ACCOUNT_ID repo secrets (see README "Deploying the website").

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-website.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Healthchecks — start
        if: ${{ vars.HEALTHCHECKS_IO_URL != '' }}
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}/start" \
            -d "Deploy website started: ${{ github.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @duyet/oma-web build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

      - name: Healthchecks — success
        if: success() && vars.HEALTHCHECKS_IO_URL != ''
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}" \
            -d "Deploy website succeeded: ${{ github.sha }}"

      - name: Healthchecks — failure
        if: failure() && vars.HEALTHCHECKS_IO_URL != ''
        run: |
          curl -fsS -m 10 --retry 3 \
            "${{ vars.HEALTHCHECKS_IO_URL }}/fail" \
            -d "Deploy website failed: ${{ github.sha }}"
