name: Deploy Workers (Production)

# Build the agent sandbox container image and deploy all three production
# workers (integrations → agent → main) to Cloudflare on every push to main.
#
# Why this exists: the agent worker is a Cloudflare Containers worker whose
# image must be built (Docker) and pushed to a registry before `wrangler
# deploy`. Local deploys can't build the image (no Docker daemon), so the
# full deploy lives here in CI where Docker is available.
#
# Order matters: integrations/agent/main form a cross-worker binding cycle
# (main↔agent↔integrations), so a single pass may warn on a not-yet-deployed
# target — the script is re-runnable; re-run resolves the cycle.

on:
  push:
    branches: [main]
    paths:
      - 'apps/agent/**'
      - 'apps/main/**'
      - 'apps/integrations/**'
      - 'apps/console/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-workers.yml'
      - 'apps/agent/Dockerfile'
      - 'apps/agent/Dockerfile.sandbox'

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push sandbox image to GHCR

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      REGISTRY: ghcr.io
      IMAGE_NAME: sandbox-base
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push sandbox base image
        uses: docker/build-push-action@v6
        with:
          context: apps/agent
          file: apps/agent/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=sandbox-base
          cache-to: type=gha,mode=max,scope=sandbox-base
          platforms: linux/amd64

      - name: Deploy integrations worker
        run: npx wrangler deploy --config apps/integrations/wrangler.jsonc --env production

      - name: Deploy agent worker
        run: npx wrangler deploy --config apps/agent/wrangler.jsonc --env production

      - name: Deploy main worker
        run: npx wrangler deploy --config apps/main/wrangler.jsonc --env production

      - name: Wire R2 → memory-events queue (idempotent)
        run: |
          npx wrangler r2 bucket notification create managed-agents-memory \
            --event-type object-create object-delete \
            --queue managed-agents-memory-events 2>/dev/null || true
