name: Release Please

# Maintains a rolling "release PR" that bumps the repo version (patch-only,
# per release-please-config.json `always-bump-patch`) and updates CHANGELOG.md
# from Conventional Commits. Merging that PR tags the release. This governs the
# self-host / deployment version; npm package publishing stays on changesets
# (release.yml) for @duyet/oma-cli and @openma/sdk.
#
# NOTE: requires the repo setting "Allow GitHub Actions to create and approve
# pull requests" (Settings → Actions → General → Workflow permissions).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
