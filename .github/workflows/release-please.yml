name: Release Please

# release-please watches Conventional Commits landing on main and maintains
# rolling "chore(release): ..." PRs that bump each tracked component and update
# its own CHANGELOG.md. Components are tracked and released independently:
#
#   - root   → repo-level CHANGELOG.md            (self-host / deploy version)
#   - web    → apps/web + apps/web/CHANGELOG.md   (public website)
#   - cli    → packages/cli + CHANGELOG.md        (oma CLI on npm)
#   - docker → docker + docker/CHANGELOG.md       (container images / charts)
#
# Each component gets its own tag (e.g. web-v0.1.0) and its own changelog.
# npm package publishing for @getoma/cli / @getoma/sdk additionally
# stays on changesets (release.yml).
#
# NOTE: requires the repo setting "Allow GitHub Actions to create and approve
# pull requests" (Settings → Actions → General → Workflow permissions).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
