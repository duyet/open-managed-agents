<!--
  Open Graph share image — 1200×630 (the Facebook/Twitter/LinkedIn standard
  large-card size). Clean zinc-white background with the 2026 oma glyph
  and the "oma" wordmark.

  NOTE on format: most modern social platforms (Facebook, Twitter/X,
  LinkedIn, Slack, Discord) now render SVG OG images fine. The one stale
  cache that historically struggled is the older Twitter card snapshotter,
  which sometimes returns a blank preview the first time it sees an SVG.
  If we hit that in practice, generate a PNG via a build-time step
  (`sharp` or similar) and update the og:image URL to `/og.png`. For now,
  SVG keeps the asset crisp and ~2 KB instead of ~120 KB.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Open Managed Agents">
  <!-- Background — same #ffffff as the light-mode bg token. -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Subtle iris-tinted halo so the image isn't a flat white card in
       a feed. Radial gradient, very low opacity iris, off-center to
       feel intentional. -->
  <defs>
    <radialGradient id="halo" cx="0.18" cy="0.22" r="0.7">
      <stop offset="0%"  stop-color="#4f46e5" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- oma glyph — rounded-square frame = the sandbox, edge wired into the
       solid node = the agent it runs. 24-viewBox mark scaled 7x (168px) and
       centered above the wordmark (x = 600 - 84 = 516). -->
  <g transform="translate(516, 130) scale(7)" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round">
    <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="5"/>
    <path d="M7 7 11 11"/>
    <circle cx="12" cy="12" r="2.75" fill="#4f46e5" stroke="none"/>
  </g>

  <!-- Wordmark — "oma" in the display font (Poppins) we use in the app.
       Falls back to system sans on renderers that don't load the webfont,
       which is fine for a static OG preview. -->
  <text x="600" y="475" text-anchor="middle"
        font-family="'Poppins', -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="84" font-weight="700" fill="#18181b"
        letter-spacing="-1">oma</text>

  <!-- Tagline -->
  <text x="600" y="540" text-anchor="middle"
        font-family="'DM Sans', -apple-system, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#52525b"
        letter-spacing="0.2">Manage agents, sessions, and infrastructure.</text>
</svg>
