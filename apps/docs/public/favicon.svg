<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="oma">
  <!-- Iris tile + the oma mark (2026 redesign): rounded-square frame = the
       sandbox, edge wired into the solid node = the managed agent. Filled
       tile reads punchy in a browser tab at 16px. Keep in sync with
       logo.svg / apps/console Logo.tsx. -->
  <rect width="64" height="64" rx="14" fill="#4f46e5" />
  <g transform="translate(9.8,9.8) scale(1.85)" fill="none">
    <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="5" stroke="#fff" stroke-width="2" />
    <path d="M7 7 11 11" stroke="#fff" stroke-width="2" stroke-linecap="round" />
    <circle cx="12" cy="12" r="2.75" fill="#fff" />
  </g>
</svg>
