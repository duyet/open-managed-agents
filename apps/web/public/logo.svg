<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="oma">
  <!-- oma mark: square brackets = the harness (the platform that wraps and
       drives an agent); the dot = the agent/session it contains and runs.
       Brackets are paths (not a font glyph) so the mark renders identically
       as a favicon, where no webfont is available. -->
  <g fill="none" stroke="#FF6B50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M24 15 H15 V49 H24" />
    <path d="M40 15 H49 V49 H40" />
  </g>
  <circle cx="32" cy="32" r="8" fill="#FF6B50" />
</svg>
