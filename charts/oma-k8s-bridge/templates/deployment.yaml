apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "oma-k8s-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oma-k8s-bridge.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "oma-k8s-bridge.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "oma-k8s-bridge.fullname" . }}
            - secretRef:
                name: {{ include "oma-k8s-bridge.secretName" . }}
          {{- if .Values.openshell.token.existingSecret }}
          env:
            - name: OPENSHELL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openshell.token.existingSecret }}
                  key: {{ .Values.openshell.token.tokenKey }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if .Values.openshell.tls.enabled }}
          volumeMounts:
            - name: openshell-tls-ca
              mountPath: /etc/openshell/tls
              readOnly: true
            - name: openshell-tls-client
              mountPath: /etc/openshell/tls-client
              readOnly: true
          {{- end }}
      {{- if .Values.openshell.tls.enabled }}
      {{- /*
      certSecret defaults to caSecret so a single Secret carrying
      ca.crt + tls.crt + tls.key works for mTLS — see values.yaml and the
      matching comment in configmap.yaml. Both volumes are always mounted
      when tls.enabled so that fallback isn't silently dropped.
      */ -}}
      {{- $certSecret := .Values.openshell.tls.certSecret | default .Values.openshell.tls.caSecret -}}
      volumes:
        - name: openshell-tls-ca
          secret:
            secretName: {{ .Values.openshell.tls.caSecret }}
        - name: openshell-tls-client
          secret:
            secretName: {{ $certSecret }}
      {{- end }}
