apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "oma-k8s-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oma-k8s-bridge.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "oma-k8s-bridge.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "oma-k8s-bridge.fullname" . }}
            - secretRef:
                name: {{ include "oma-k8s-bridge.fullname" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
