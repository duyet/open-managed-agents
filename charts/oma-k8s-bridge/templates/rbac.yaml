{{- if and .Values.rbac.create (ne .Values.config.backend "openshell") }}
{{- /*
The OpenShell backend (config.backend: openshell) never touches a
Kubernetes Sandbox CR, a pod, or a node — it fronts an external gRPC
gateway instead (see apps/k8s-bridge/src/openshell-manager.ts). None of
the grants below apply to it, so RBAC is skipped entirely for that
backend rather than shipping unused pod create/delete permissions that
would contradict this file's own "every verb traces to a real call site"
rule.

RBAC is split by scope, not bundled into one ClusterRole:

  1. A namespace-scoped Role, bound in the sandbox namespace
     (.Values.rbac.targetNamespace, falling back to .Values.config.namespace)
     — covers everything K8sManager.createBox/destroyBox/exec/readFile/
     writeFile/getSandboxLogs actually do to a session's sandbox: create the
     `Sandbox` custom resource (packages/sandbox/src/adapters/kubernetes.ts),
     exec into and read logs from the pod it produces. This is namespaced
     because every verb here targets objects that live in that one
     namespace — a Role is sufficient and strictly less privilege than a
     ClusterRole bound cluster-wide.
  2. A ClusterRole, bound cluster-wide, ONLY for operations that are
     genuinely cluster-scoped (nodes have no namespace) or that must span
     every namespace (K8sManager.getClusterCapacity's
     listPodForAllNamespaces, used for the /api/v1/cluster/capacity
     dashboard figure). No Role can grant either of these regardless of
     scoping intent.

Every verb below is derived from a real call site — see the source
comments for exactly which method uses it. No wildcards, no
cluster-admin, no unused verbs (e.g. `watch` is dropped: neither
k8s-manager.ts nor the KubernetesSandboxExecutor adapter ever opens a
watch — Sandbox readiness is polled, see waitForReady in
packages/sandbox/src/adapters/kubernetes.ts).
*/ -}}
{{- $targetNs := .Values.rbac.targetNamespace | default .Values.config.namespace -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  namespace: {{ $targetNs }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
rules:
  # Sandbox pod lifecycle — KubernetesSandboxExecutor creates a bare
  # `Sandbox` custom resource per session (K8sManager.createBox) and
  # deletes it on teardown (K8sManager.destroyBox / executor.destroy()).
  # No `watch`: readiness is polled (waitForReady), not watched.
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["create", "get", "list", "delete"]
  # Sandbox discovery/detail — K8sManager.discoverSandboxes/getSandboxHealth/
  # getSandboxDetail list and read the pods the Sandbox controller creates.
  # No `delete`: the bridge only ever deletes the owning Sandbox object
  # above and lets the controller cascade the pod deletion.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Command execution — KubernetesSandboxExecutor.runExec uses the
  # standard pods/exec subresource (the same one `kubectl exec` uses) via
  # @kubernetes/client-node's Exec helper.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Log streaming — K8sManager.getSandboxLogs calls readNamespacedPodLog
  # for the /api/v1/sandboxes/:podName/logs endpoint.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  namespace: {{ $targetNs }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "oma-k8s-bridge.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "oma-k8s-bridge.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
rules:
  # Cluster capacity reporting — K8sManager.getClusterInfo/getNodes/
  # getCapacityUsage list nodes for /api/v1/cluster/*. Nodes are
  # cluster-scoped: no Role can grant this.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Cross-namespace pod listing — K8sManager.getClusterCapacity calls
  # listPodForAllNamespaces to aggregate requested CPU/memory across the
  # WHOLE cluster (not just the sandbox namespace) for the
  # estimatedAdditionalSandboxes figure. list-only, no get/exec here —
  # per-pod detail/exec stays scoped to the namespaced Role above.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  # Resource usage metrics — K8sManager.getPodMetrics, backs
  # /api/v1/sandboxes/metrics. Only takes effect if metrics-server is
  # installed; the bridge fails open (empty list) otherwise.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "oma-k8s-bridge.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "oma-k8s-bridge.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
