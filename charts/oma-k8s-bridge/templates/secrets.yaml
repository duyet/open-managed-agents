{{- /*
Only render a Secret when the caller didn't bring their own — production
installs should create K8S_BRIDGE_TOKEN out-of-band (kubectl create secret
generic, external-secrets, sealed-secrets, ...) and set secret.existingSecret
instead of trusting a value passed on the Helm command line (which lands in
`helm history`/release storage in plaintext). secret.token defaults to an
empty string placeholder — never populate it with a real value here.
*/ -}}
{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oma-k8s-bridge.fullname" . }}
  labels:
    {{- include "oma-k8s-bridge.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secret.tokenKey }}: {{ .Values.secret.token | b64enc | quote }}
{{- end }}
