image:
  repository: ghcr.io/duyet/oma-k8s-bridge
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

secret:
  # Bearer token for /api/v1/* auth (see apps/k8s-bridge/src/auth.ts).
  # Generate with `openssl rand -base64 32`. NEVER commit a real value here
  # — leave this empty and either pass `--set secret.token=$TOKEN` at
  # install time, or (preferred for production) create the Secret
  # out-of-band and point `existingSecret` at it instead.
  token: ""
  # Name of a pre-existing Secret to source K8S_BRIDGE_TOKEN from (e.g.
  # created via `kubectl create secret generic` or external-secrets).
  # When set, the chart does not render its own Secret and `secret.token`
  # is ignored.
  existingSecret: ""
  # Key inside `existingSecret` (or the chart-managed Secret) holding the
  # token value.
  tokenKey: K8S_BRIDGE_TOKEN
  # Optional bearer token for the OpenShell gateway (OPENSHELL_TOKEN),
  # injected only for the openshell backend. Prefer `existingSecret` in
  # production; leave empty when the gateway needs no token.
  openshellToken: ""

config:
  namespace: sandboxes
  # Batteries-included toolset image (git, curl, gh, ripgrep, python3) —
  # see docker/base/Dockerfile. Pin your own image here if you need more.
  sandboxImage: ghcr.io/duyet/oma-runtime-base:latest
  runtimeClass: ""
  serviceAccount: ""

  # Sandbox substrate the bridge fronts (apps/k8s-bridge/src/backend.ts):
  #   "" / "k8s"  → Kubernetes pods (K8sManager) — the default.
  #   "openshell" → NVIDIA OpenShell sandboxes over gRPC (OpenShellManager);
  #                 the bridge owns no cluster, so RBAC below is unused.
  # Leave empty to auto-detect: an openshell.endpoint selects OpenShell.
  backend: ""
  openshell:
    # gRPC endpoint of the OpenShell gateway (`host:port`). Required when
    # backend is "openshell". Sets OPENSHELL_GATEWAY_ENDPOINT.
    endpoint: ""
    # Sandbox container image (OPENSHELL_IMAGE); empty = gateway default.
    image: ""
    # TLS to the gateway. When enabled, mount the CA/cert/key and point the
    # paths below at them (OPENSHELL_GATEWAY_TLS + *_PATH vars).
    tls:
      enabled: false
      caPath: ""
      certPath: ""
      keyPath: ""

service:
  type: ClusterIP
  port: 8100

ingress:
  enabled: false
  host: oma-k8s-bridge.oma.local
  className: nginx
  tls:
    enabled: false
    secretName: oma-k8s-bridge-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

rbac:
  create: true
  # Namespace the Role/RoleBinding (sandbox pod lifecycle) is created in —
  # must match where sandbox pods actually run. Falls back to
  # config.namespace when unset. The ClusterRole/ClusterRoleBinding
  # (nodes + metrics + cross-namespace pod listing) is unaffected by this
  # — those grants are inherently cluster-scoped. See templates/rbac.yaml.
  targetNamespace: ""

serviceAccount:
  create: true
  name: ""
