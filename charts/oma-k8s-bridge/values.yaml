image:
  repository: ghcr.io/duyet/oma-k8s-bridge
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

secret:
  token: ""

config:
  namespace: sandboxes
  # Batteries-included toolset image (git, curl, gh, ripgrep, python3) —
  # see docker/base/Dockerfile. Pin your own image here if you need more.
  sandboxImage: ghcr.io/duyet/oma-runtime-base:latest
  runtimeClass: ""
  serviceAccount: ""

service:
  type: ClusterIP
  port: 8100

ingress:
  enabled: false
  host: oma-k8s-bridge.oma.local
  className: nginx
  tls:
    enabled: false
    secretName: oma-k8s-bridge-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
