image:
  repository: ghcr.io/duyet/oma-k8s-bridge
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

secret:
  # Bearer token for /api/v1/* auth (see apps/k8s-bridge/src/auth.ts).
  # Generate with `openssl rand -base64 32`. NEVER commit a real value here
  # — leave this empty and either pass `--set secret.token=$TOKEN` at
  # install time, or (preferred for production) create the Secret
  # out-of-band and point `existingSecret` at it instead.
  token: ""
  # Name of a pre-existing Secret to source K8S_BRIDGE_TOKEN from (e.g.
  # created via `kubectl create secret generic` or external-secrets).
  # When set, the chart does not render its own Secret and `secret.token`
  # is ignored.
  existingSecret: ""
  # Key inside `existingSecret` (or the chart-managed Secret) holding the
  # token value.
  tokenKey: K8S_BRIDGE_TOKEN

config:
  namespace: sandboxes
  # Batteries-included toolset image (git, curl, gh, ripgrep, python3) —
  # see docker/base/Dockerfile. Pin your own image here if you need more.
  sandboxImage: ghcr.io/duyet/oma-runtime-base:latest
  runtimeClass: ""
  serviceAccount: ""
  # Which BridgeBackend apps/k8s-bridge runs (see
  # apps/k8s-bridge/src/backend.ts:resolveBridgeBackendKind):
  #   k8s       — Kubernetes Sandbox CRD backend (default; existing behavior).
  #   openshell — fronts an NVIDIA OpenShell gateway over gRPC (see the
  #               `openshell:` block below). Owns no pods, so RBAC is
  #               skipped entirely for this backend.
  #   auto      — let the process itself auto-detect from whether
  #               OPENSHELL_GATEWAY_ENDPOINT is set (matches the bridge's
  #               own BRIDGE_BACKEND=auto behavior). Prefer an explicit
  #               value in a chart install.
  backend: k8s

# Only consulted when config.backend is "openshell" (or "auto" with an
# endpoint set). Maps directly onto the OPENSHELL_* env vars
# `OpenShellSandbox` / `resolveOpenShellTlsFromEnv` read
# (packages/sandbox/src/adapters/openshell.ts).
openshell:
  # host:port (or DNS name) of the OpenShell gateway, e.g.
  # openshell.openshell.svc.cluster.local:50051. Required when
  # config.backend is openshell — the chart refuses to render an empty
  # OPENSHELL_GATEWAY_ENDPOINT, which would otherwise trip the bridge's
  # own auto-detect.
  endpoint: ""
  # Sandbox container image OpenShell should launch. Empty = gateway default.
  image: ""
  tls:
    enabled: false
    # Name of a Secret carrying the CA (and, for mTLS, cert/key) used to
    # verify/authenticate to the gateway. Required when tls.enabled.
    caSecret: ""
    # Optional: a separate Secret for the client cert/key (mTLS). Falls
    # back to caSecret when unset, so a single Secret can carry all three
    # keys.
    certSecret: ""
    # Keys inside the secret(s) above.
    caKey: ca.crt
    certKey: tls.crt
    keyKey: tls.key
  token:
    # Name of a pre-existing Secret carrying the OPENSHELL_TOKEN bearer
    # credential for the gateway. Never set a real token in values.yaml —
    # same out-of-band pattern as secret.existingSecret above. Empty =
    # no OPENSHELL_TOKEN is set (gateway allows unauthenticated access).
    existingSecret: ""
    tokenKey: OPENSHELL_TOKEN

service:
  type: ClusterIP
  port: 8100

ingress:
  enabled: false
  host: oma-k8s-bridge.oma.local
  className: nginx
  tls:
    enabled: false
    secretName: oma-k8s-bridge-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

rbac:
  create: true
  # Namespace the Role/RoleBinding (sandbox pod lifecycle) is created in —
  # must match where sandbox pods actually run. Falls back to
  # config.namespace when unset. The ClusterRole/ClusterRoleBinding
  # (nodes + metrics + cross-namespace pod listing) is unaffected by this
  # — those grants are inherently cluster-scoped. See templates/rbac.yaml.
  targetNamespace: ""

serviceAccount:
  create: true
  name: ""
