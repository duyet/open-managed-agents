# EXAMPLE ONLY — do not commit a real credentials.json. Create this Secret
# out-of-band instead (kubectl / external-secrets / sealed-secrets):
#
#   # 1. On any machine, pair a runtime with the control plane:
#   oma bridge setup --server-url https://<your-instance> --no-service
#   # 2. Ship the resulting creds file into the cluster as a Secret:
#   kubectl create secret generic oma-bridge-daemon-creds \
#     --from-file=credentials.json="$HOME/.oma/bridge/credentials.json"
#   # 3. (openshell backend, optional) add the gateway token:
#   kubectl create secret generic oma-bridge-daemon-creds \
#     --from-file=credentials.json="$HOME/.oma/bridge/credentials.json" \
#     --from-literal=OPENSHELL_TOKEN="<gateway-token>"  # key: OMA_OPENSHELL_TOKEN
#
# The manifest mounts `credentials.json` at /home/oma/.oma/bridge/credentials.json
# and reads OMA_OPENSHELL_TOKEN from this Secret (optional).
apiVersion: v1
kind: Secret
metadata:
  name: oma-bridge-daemon-creds
  labels:
    app: oma-bridge-daemon
type: Opaque
stringData:
  credentials.json: |
    { "REPLACE_ME": "paste ~/.oma/bridge/credentials.json here or create out-of-band" }
  # OMA_OPENSHELL_TOKEN: "<gateway-token>"   # openshell backend only
